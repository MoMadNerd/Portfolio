<div class="activity-feed">
  <ul class="list-group list-group-flush">
    <li *ngFor="let activity of activityItems" class="list-group-item list-group-item-action p-3">
      <div class="d-flex w-100 justify-content-between align-items-center">
        <div class="d-flex align-items-center flex-grow-1">
          <i [ngClass]="'fas fa-' + activity.icon" class="me-3 text-{{ getColorClass(activity.color) }}"></i>
          <div>
            <span class="fw-medium">{{ activity.action }}</span>
            <ng-container *ngIf="activity.userId">
              <span class="text-muted small ms-2">— {{ activity.userId }}</span>
            </ng-container>
          </div>
        </div>
        <small class="text-muted">{{ activity.timestamp }}</small>
      </div>
    </li>
  </ul>
</div>
