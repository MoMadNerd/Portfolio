<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <!-- Header -->
      <div class="text-center mb-5">
        <h1 class="display-4 mb-3">My Projects</h1>
        <p class="lead text-muted">A showcase of my best work</p>
      </div>

      <!-- Projects Grid -->
      <div class="row">
        <div class="col-md-6 mb-4" *ngFor="let project of projects">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title mb-3">{{ project.name }}</h5>
              <p class="card-text text-muted">{{ project.description }}</p>

              <!-- Tech Stack -->
              <div class="mb-3">
                <small class="text-muted d-block mb-2">Technologies Used:</small>
                <span *ngFor="let tech of project.tech" class="badge bg-primary me-1">{{ tech }}</span>
              </div>

              <!-- Features -->
              <div class="mb-3">
                <small class="text-muted d-block mb-2">Features:</small>
                <ul class="list-unstyled">
                  <li *ngFor="let feature of project.features">
                    <i class="fas fa-check text-success me-2"></i>{{ feature }}
                  </li>
                </ul>
              </div>

              <!-- Actions -->
              <div class="d-flex gap-2">
                <a [href]="project.github" class="btn btn-outline-primary btn-sm" target="_blank" rel="noopener">
                  <i class="fab fa-github"></i> View Code
                </a>
                <a href="#" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-external-link-alt"></i> Live Demo
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact CTA -->
      <div class="text-center mt-5">
        <p class="mb-3">Want to see more or collaborate on a project?</p>
        <a routerLink="/contact" class="btn btn-primary btn-lg">Get In Touch</a>
      </div>
    </div>
  </div>
</div>
