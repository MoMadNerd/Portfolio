<div [ngClass]="bgColor" class="card text-white h-100 shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h6 class="card-title mb-0">{{ data.label }}</h6>
      <i [ngClass]="'fas fa-' + data.icon" class="fs-4 opacity-50"></i>
    </div>
    <h3 class="mb-0">{{ data.value | number:'1.0-0' }}{{ data.value >= 1000 ? 'K' : '' }}</h3>
    <small class="text-white-50">
      <span [ngClass]="{
        'text-success': data.trend === 'up',
        'text-danger': data.trend === 'down',
        'text-white': data.trend === 'neutral'
      }">
        {{ data.change > 0 ? '+' : '' }}{{ data.change }}%
      </span>
      vs last month
    </small>
  </div>
</div>
