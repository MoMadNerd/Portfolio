<div class="card">
  <div class="card-header bg-white">
    <h5 class="mb-0">
      <i class="fas fa-chart-" [ngClass]="{
        'line': type === 'line',
        'bar': type === 'bar',
        'pie': type === 'pie',
        'doughnut': type === 'doughnut'
      }" [ngClass]="'-' + type" class="me-2"></i>
      {{ label }}
    </h5>
  </div>
  <div class="card-body">
    <canvas [id]="label"></canvas>
  </div>
</div>
